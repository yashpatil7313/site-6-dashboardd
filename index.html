<!DOCTYPE html>
<html lang="en">
<head>
    <title>Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">

        <!-- SIDEBAR -->
        <aside>
            <h2>Dashboard</h2>
            <ul>
                <li>Home</li>
                <li>Analytics</li>
                <li>Users</li>
                <li>Settings</li>
            </ul>
        </aside>

        <!-- MAIN CONTENT -->
        <main>

            <!-- HEADER -->
            <header>
                <h1>Welcome, Yash 👋</h1>
            </header>

            <!-- CARDS -->
            <section class="cards">
                <div class="card">
                    <h2>Users</h2>
                    <p>1200</p>
                </div>

                <div class="card">
                    <h2>Sales</h2>
                    <p>₹50,000</p>
                </div>

                <div class="card">
                    <h2>Orders</h2>
                    <p>320</p>
                </div>

                <div class="card">
                    <h2>Revenue</h2>
                    <p>₹1,20,000</p>
                </div>
            </section>

        </main>

    </div>

</body>
</html>
